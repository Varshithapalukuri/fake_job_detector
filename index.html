<!DOCTYPE html>
<html>
<head>
<title>Fake Job Detector Pro</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

#loginPage {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
}

#dashboard {
    display:none;
    padding:30px;
}

textarea {
    width:100%;
    height:120px;
    border-radius:10px;
    padding:10px;
    border:none;
}

button {
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

.checkBtn { background:#22c55e; }
.applyBtn { background:#3b82f6; color:white; }
.ignoreBtn { background:#ef4444; color:white; }

.card {
    margin-top:20px;
    padding:20px;
    border-radius:15px;
}

.fake { background:#dc2626; }
.real { background:#16a34a; }

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="glass">
        <h2>Login</h2>
        <input id="username" placeholder="Enter Username">
        <button class="checkBtn" onclick="login()">Enter</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <h1>🚨 Fake Job Detector</h1>

    <div class="grid">

        <div class="glass">
            <h3>Check Job</h3>
            <textarea id="jobText"></textarea>
            <button class="checkBtn" onclick="checkJob()">Analyze</button>
        </div>

        <div class="glass">
            <h3>Result</h3>
            <div id="result">Waiting...</div>
        </div>

    </div>

    <div class="glass">
        <h3>📜 History</h3>
        <div id="historyList"></div>
    </div>

</div>

<script>

// LOGIN
function login(){
    let user=document.getElementById("username").value;
    if(user){
        localStorage.setItem("user",user);
        showDashboard();
    }
}

function showDashboard(){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("dashboard").style.display="block";
}

if(localStorage.getItem("user")) showDashboard();

// HISTORY
function saveToHistory(text,result){
    let h=JSON.parse(localStorage.getItem("history"))||[];
    h.push({text,result});
    localStorage.setItem("history",JSON.stringify(h));
}

function loadHistory(){
    let h=JSON.parse(localStorage.getItem("history"))||[];
    let html="";
    h.slice(-5).reverse().forEach(item=>{
        html+=`<p>🔹 ${item.result.prediction}</p>`;
    });
    document.getElementById("historyList").innerHTML=html;
}

// SIMILARITY
function similarity(a,b){
    let same=0;
    for(let i=0;i<Math.min(a.length,b.length);i++){
        if(a[i]===b[i]) same++;
    }
    return same/Math.max(a.length,b.length);
}

function checkHistory(text){
    let h=JSON.parse(localStorage.getItem("history"))||[];
    for(let item of h){
        if(similarity(item.text,text)>0.8){
            return item.result;
        }
    }
    return null;
}

// MAIN
async function checkJob(){

    let text=document.getElementById("jobText").value;

    let old=checkHistory(text);
    if(old){
        display(old);
        return;
    }

    let res=await fetch("https://fake-job-detector-vdcr.onrender.com/predict",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    let data=await res.json();

    saveToHistory(text,data);
    display(data);
    loadHistory();
}

// DISPLAY
function display(data){

    let cls=data.prediction==="FAKE JOB"?"card fake":"card real";

    let btn=data.prediction==="FAKE JOB"
        ? `<button class="ignoreBtn">Ignore</button>`
        : `<button class="applyBtn">Apply Now</button>`;

    let reasons=data.reasons.length
        ? "<br>"+data.reasons.join("<br>")
        : "";

    document.getElementById("result").innerHTML=`
    <div class="${cls}">
        <h2>${data.prediction}</h2>
        Confidence: ${data.confidence}<br>
        🏢 ${data.company}<br>
        ${reasons}<br><br>
        ${btn}
    </div>
    `;
}

loadHistory();

</script>

</body>
</html>
