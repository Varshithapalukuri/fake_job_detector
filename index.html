<!DOCTYPE html>
<html>
<head>
<title>Fake Job Detector</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
    padding: 50px;
}

textarea {
    width: 60%;
    height: 130px;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.checkBtn { background: #22c55e; color: white; }
.applyBtn { background: blue; color: white; }
.ignoreBtn { background: red; color: white; }

.card {
    margin-top: 30px;
    padding: 20px;
    border-radius: 12px;
    width: 50%;
    margin-left: auto;
    margin-right: auto;
}

.fake { background: #dc2626; }
.real { background: #16a34a; }
</style>

</head>

<body>

<h1>🚨 Fake Job Detector</h1>

<textarea id="jobText" placeholder="Paste job description here..."></textarea><br>

<button class="checkBtn" onclick="checkJob()">Check Job</button>

<div id="loading"></div>
<div id="result"></div>

<script>

// Save history
function saveToHistory(text, result) {
    let history = JSON.parse(localStorage.getItem("jobHistory")) || [];
    history.push({ text, result });
    localStorage.setItem("jobHistory", JSON.stringify(history));
}

// Check history
function checkHistory(text) {
    let history = JSON.parse(localStorage.getItem("jobHistory")) || [];
    for (let item of history) {
        if (item.text === text) {
            return item.result;
        }
    }
    return null;
}

// Display result
function displayResult(data) {

    let className = data.prediction === "FAKE JOB" ? "card fake" : "card real";

    let actionButton = "";

    if (data.prediction === "FAKE JOB") {
        actionButton = `<button class="ignoreBtn">Ignore</button>`;
    } else {
        actionButton = `<button class="applyBtn">Apply Now</button>`;
    }

    let reasonsHtml = "";

    if (data.reasons && data.reasons.length > 0) {
        reasonsHtml = "<br><br>⚠ Reasons:<br>" + data.reasons.join("<br>");
    }

    document.getElementById("result").innerHTML = `
        <div class="${className}">
            <h2>${data.prediction}</h2>
            Confidence: ${data.confidence}
            ${reasonsHtml}
            <br><br>
            ${actionButton}
        </div>
    `;
}

// Main function
async function checkJob() {

    let text = document.getElementById("jobText").value;

    if (!text) {
        alert("Enter job description");
        return;
    }

    // Check history first
    let oldResult = checkHistory(text);
    if (oldResult) {
        displayResult(oldResult);
        return;
    }

    document.getElementById("loading").innerText = "Checking...";
    document.getElementById("result").innerHTML = "";

    try {
        let response = await fetch("https://fake-job-detector-vdcr.onrender.com/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text: text })
        });

        let data = await response.json();

        document.getElementById("loading").innerText = "";

        saveToHistory(text, data);

        displayResult(data);

    } catch (error) {
        document.getElementById("loading").innerText = "";
        document.getElementById("result").innerText = "Error connecting to server";
    }
}

</script>

</body>
</html>
